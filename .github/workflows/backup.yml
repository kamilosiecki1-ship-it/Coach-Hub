name: Daily DB Backup

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
        run: |
          if [ -z "$DATABASE_DIRECT_URL" ]; then
            echo "ERROR: DATABASE_DIRECT_URL secret is not set."
            exit 1
          fi
          pg_dump "$DATABASE_DIRECT_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            --file="backup-$(date +%Y-%m-%d).dump"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: "*.dump"
          retention-days: 7
