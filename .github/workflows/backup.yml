name: Daily DB Backup

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
        run: |
          if [ -z "$DATABASE_DIRECT_URL" ]; then
            echo "ERROR: DATABASE_DIRECT_URL secret is not set."
            exit 1
          fi
          # Resolve hostname to IPv4 — GitHub Actions can't reach Supabase over IPv6
          DUMP_URL=$(python3 -c "import os,urllib.parse,socket; u=urllib.parse.urlparse(os.environ['DATABASE_DIRECT_URL']); ipv4=socket.getaddrinfo(u.hostname,None,socket.AF_INET)[0][4][0]; netloc=u.netloc.replace(u.hostname,ipv4); print(u._replace(netloc=netloc).geturl())")
          pg_dump "$DUMP_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            --file="backup-$(date +%Y-%m-%d).dump"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: "*.dump"
          retention-days: 7
